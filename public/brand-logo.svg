<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none" role="img" aria-label="FashionVerse">
  <defs>
    <linearGradient id="rg1" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F0C4B0"/>
      <stop offset="35%" stop-color="#D4957A"/>
      <stop offset="70%" stop-color="#B8735A"/>
      <stop offset="100%" stop-color="#8E4F3F"/>
    </linearGradient>
    <linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9896E"/>
      <stop offset="50%" stop-color="#E8B89A"/>
      <stop offset="100%" stop-color="#A66B52"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Intertwined FV monogram -->
  <g filter="url(#softGlow)" transform="translate(120 72)">
    <!-- V stroke -->
    <path
      d="M-18 -42 C-8 -42 2 -28 14 -6 C22 8 30 28 38 42 L22 42 C16 30 10 18 2 6 C-6 -6 -14 -18 -22 -30 C-26 -36 -22 -42 -18 -42 Z"
      fill="url(#rg1)"
      opacity="0.95"
    />
    <!-- F vertical -->
    <path
      d="M-52 -42 L-36 -42 L-36 -6 C-36 6 -28 14 -16 14 C-4 14 4 6 4 -6 L4 -42 L20 -42 L20 -6 C20 18 2 30 -16 30 C-34 30 -52 18 -52 -6 Z"
      fill="url(#rg2)"
    />
    <!-- F top bar flowing into V -->
    <path
      d="M-52 -42 L-4 -42 C8 -42 18 -32 24 -20 C30 -8 34 4 38 16 L22 16 C18 6 12 -2 2 -8 C-6 -12 -16 -14 -28 -14 L-52 -14 Z"
      fill="url(#rg1)"
    />
    <!-- F middle bar -->
    <path
      d="M-52 -2 L-12 -2 C-2 -2 6 2 10 8 L-4 8 C-8 4 -14 2 -22 2 L-52 2 Z"
      fill="url(#rg2)"
      opacity="0.9"
    />
    <!-- Highlight stroke -->
    <path
      d="M-48 -38 L-8 -38 C4 -38 12 -30 18 -20"
      stroke="#F5D5C8"
      stroke-width="1.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.55"
    />
  </g>

  <!-- Wordmark -->
  <text
    x="120"
    y="148"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="6"
    fill="#1a1a2e"
  >FASHION</text>
  <text
    x="120"
    y="178"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="6"
    fill="#1a1a2e"
  >VERSE</text>
</svg>
