<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, 
          initial-scale=1.0">
    <title>FV Driver — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        color: #ffffff;
        font-family: Inter, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        gap: 16px;
      }
      .truck { font-size: 64px; }
      h1 { color: #00C853; font-size: 22px; font-weight: 700; }
      p { color: rgba(255,255,255,0.5); font-size: 14px;
          line-height: 1.6; }
      .retry {
        margin-top: 8px;
        padding: 12px 28px;
        background: #00C853;
        color: #000;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="truck">🚚</div>
    <h1>You're Offline</h1>
    <p>Check your internet connection<br>
       New orders need internet to appear.</p>
    <button class="retry" 
            onclick="window.location.reload()">
      Try Again
    </button>
  </body>
  </html>
